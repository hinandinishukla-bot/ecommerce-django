<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PharmCare Login</title>

    {% load static %}

    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>

<body>

<div class="container">

    <div class="left">

        <h2>Login</h2>

        <p>Welcome to PharmCare Platform</p>
        

        {% if messages %}
            {% for message in messages %}
                <p style="color: red;">{{ message }}</p>
            {% endendfor %}
        {% endif %}
        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="input-box">
                <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    required
                >
            </div>

            <div class="input-box">
                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required
                >
            </div>

            <button type="submit">
                Login
            </button>

        </form>

    </div>

    <div class="right">

        <img src="{% static 'images/login.png' %}" alt="Pharmacy">

    </div>

</div>

</body>
</html>
